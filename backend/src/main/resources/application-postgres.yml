spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/navalgo}
    username: ${SPRING_DATASOURCE_USERNAME:navalgo}
    password: ${SPRING_DATASOURCE_PASSWORD:change_me}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        timezone:
          default_storage: NORMALIZE_UTC

app:
  jwt:
    secret: ${APP_JWT_SECRET}
    expiration-ms: ${APP_JWT_EXPIRATION_MS:3600000}
  media:
    spaces-endpoint: ${APP_MEDIA_SPACES_ENDPOINT}
    spaces-region: ${APP_MEDIA_SPACES_REGION:fra1}
    spaces-bucket: ${APP_MEDIA_SPACES_BUCKET}
    spaces-access-key: ${APP_MEDIA_SPACES_ACCESS_KEY}
    spaces-secret-key: ${APP_MEDIA_SPACES_SECRET_KEY}
    public-base-url: ${APP_MEDIA_PUBLIC_BASE_URL}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
