spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/navalgo}
    username: ${SPRING_DATASOURCE_USERNAME:navalgo}
    password: ${SPRING_DATASOURCE_PASSWORD:change_me}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        timezone:
          default_storage: NORMALIZE_UTC
  servlet:
    multipart:
      max-file-size: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:25MB}
      max-request-size: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:30MB}
  sql:
    init:
      mode: always
      schema-locations: classpath:db/postgres-startup-schema.sql

app:
  jwt:
    secret: ${APP_JWT_SECRET}
    expiration-ms: ${APP_JWT_EXPIRATION_MS:3600000}
    refresh-expiration-ms: ${APP_JWT_REFRESH_EXPIRATION_MS:604800000}
  security:
    cors:
      allowed-origins: ${APP_SECURITY_CORS_ALLOWED_ORIGINS:https://naval-go.com,https://www.naval-go.com,http://localhost:*,http://127.0.0.1:*}
    cookies:
      refresh-name: ${APP_SECURITY_COOKIE_REFRESH_NAME:navalgo_refresh_token}
      same-site: ${APP_SECURITY_COOKIE_SAME_SITE:None}
      secure: ${APP_SECURITY_COOKIE_SECURE:true}
      path: ${APP_SECURITY_COOKIE_PATH:/api/auth}
  media:
    spaces-endpoint: ${APP_MEDIA_SPACES_ENDPOINT}
    spaces-region: ${APP_MEDIA_SPACES_REGION:fra1}
    spaces-bucket: ${APP_MEDIA_SPACES_BUCKET}
    spaces-access-key: ${APP_MEDIA_SPACES_ACCESS_KEY}
    spaces-secret-key: ${APP_MEDIA_SPACES_SECRET_KEY}
    public-base-url: ${APP_MEDIA_PUBLIC_BASE_URL}
    max-image-size-bytes: ${APP_MEDIA_MAX_IMAGE_SIZE_BYTES:10485760}
    max-video-size-bytes: ${APP_MEDIA_MAX_VIDEO_SIZE_BYTES:26214400}
    max-signature-size-bytes: ${APP_MEDIA_MAX_SIGNATURE_SIZE_BYTES:5242880}
    max-profile-photo-size-bytes: ${APP_MEDIA_MAX_PROFILE_PHOTO_SIZE_BYTES:5242880}
  firebase:
    enabled: ${APP_FIREBASE_ENABLED:true}
    service-account-path: ${APP_FIREBASE_SERVICE_ACCOUNT_PATH:}
    service-account-json: ${APP_FIREBASE_SERVICE_ACCOUNT_JSON:}
  scheduling:
    work-order-close-reminders-cron: ${APP_SCHEDULING_WORK_ORDER_CLOSE_REMINDERS_CRON:0 0 9 * * *}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
