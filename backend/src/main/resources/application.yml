server:
  port: 8080
  shutdown: graceful

spring:
  datasource:
    url: jdbc:h2:mem:navalgo;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: false
      path: /h2-console
  servlet:
    multipart:
      max-file-size: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:25MB}
      max-request-size: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:30MB}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

app:
  jwt:
    secret: ${APP_JWT_SECRET}
    expiration-ms: ${APP_JWT_EXPIRATION_MS:3600000}
    refresh-expiration-ms: ${APP_JWT_REFRESH_EXPIRATION_MS:604800000}
  security:
    cors:
      allowed-origins: ${APP_SECURITY_CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*}
    cookies:
      refresh-name: ${APP_SECURITY_COOKIE_REFRESH_NAME:navalgo_refresh_token}
      same-site: ${APP_SECURITY_COOKIE_SAME_SITE:Lax}
      secure: ${APP_SECURITY_COOKIE_SECURE:false}
      path: ${APP_SECURITY_COOKIE_PATH:/api/auth}
  media:
    spaces-endpoint: ${APP_MEDIA_SPACES_ENDPOINT:http://localhost}
    spaces-region: ${APP_MEDIA_SPACES_REGION:fra1}
    spaces-bucket: ${APP_MEDIA_SPACES_BUCKET:navalgo-media}
    spaces-access-key: ${APP_MEDIA_SPACES_ACCESS_KEY:local}
    spaces-secret-key: ${APP_MEDIA_SPACES_SECRET_KEY:local}
    public-base-url: ${APP_MEDIA_PUBLIC_BASE_URL:http://localhost/media}
    max-image-size-bytes: ${APP_MEDIA_MAX_IMAGE_SIZE_BYTES:10485760}
    max-video-size-bytes: ${APP_MEDIA_MAX_VIDEO_SIZE_BYTES:26214400}
    max-signature-size-bytes: ${APP_MEDIA_MAX_SIGNATURE_SIZE_BYTES:5242880}
    max-profile-photo-size-bytes: ${APP_MEDIA_MAX_PROFILE_PHOTO_SIZE_BYTES:5242880}
  firebase:
    enabled: ${APP_FIREBASE_ENABLED:true}
    service-account-path: ${APP_FIREBASE_SERVICE_ACCOUNT_PATH:}
    service-account-json: ${APP_FIREBASE_SERVICE_ACCOUNT_JSON:}
  scheduling:
    work-order-close-reminders-cron: ${APP_SCHEDULING_WORK_ORDER_CLOSE_REMINDERS_CRON:0 0 9 * * *}
