server:
  port: 8080
  shutdown: graceful

spring:
  datasource:
    url: jdbc:h2:mem:navalgo;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: false
      path: /h2-console

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

app:
  jwt:
    secret: ${APP_JWT_SECRET}
    expiration-ms: ${APP_JWT_EXPIRATION_MS:3600000}
  media:
    spaces-endpoint: ${APP_MEDIA_SPACES_ENDPOINT:http://localhost}
    spaces-region: ${APP_MEDIA_SPACES_REGION:fra1}
    spaces-bucket: ${APP_MEDIA_SPACES_BUCKET:navalgo-media}
    spaces-access-key: ${APP_MEDIA_SPACES_ACCESS_KEY:local}
    spaces-secret-key: ${APP_MEDIA_SPACES_SECRET_KEY:local}
    public-base-url: ${APP_MEDIA_PUBLIC_BASE_URL:http://localhost/media}
