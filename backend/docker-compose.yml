services:
  backend:
    build: .
    container_name: navalgo-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://private-navalgo-db-do-user-33837097-0.h.db.ondigitalocean.com:25060/defaultdb?sslmode=require}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-doadmin}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      APP_JWT_SECRET: ${APP_JWT_SECRET}
      APP_JWT_EXPIRATION_MS: ${APP_JWT_EXPIRATION_MS:-3600000}
      APP_SECURITY_CORS_ALLOWED_ORIGINS: ${APP_SECURITY_CORS_ALLOWED_ORIGINS:-https://naval-go.com,https://www.naval-go.com,http://localhost:*,http://127.0.0.1:*}
      APP_MEDIA_SPACES_ENDPOINT: ${APP_MEDIA_SPACES_ENDPOINT}
      APP_MEDIA_SPACES_REGION: ${APP_MEDIA_SPACES_REGION:-fra1}
      APP_MEDIA_SPACES_BUCKET: ${APP_MEDIA_SPACES_BUCKET}
      APP_MEDIA_SPACES_ACCESS_KEY: ${APP_MEDIA_SPACES_ACCESS_KEY}
      APP_MEDIA_SPACES_SECRET_KEY: ${APP_MEDIA_SPACES_SECRET_KEY}
      APP_MEDIA_PUBLIC_BASE_URL: ${APP_MEDIA_PUBLIC_BASE_URL}
      APP_FIREBASE_ENABLED: ${APP_FIREBASE_ENABLED:-true}
      APP_FIREBASE_SERVICE_ACCOUNT_PATH: ${APP_FIREBASE_SERVICE_ACCOUNT_PATH:-/run/secrets/firebase-admin.json}
      APP_FIREBASE_SERVICE_ACCOUNT_JSON: ${APP_FIREBASE_SERVICE_ACCOUNT_JSON:-}
    ports:
      - "${BACKEND_BIND_ADDRESS:-127.0.0.1}:8080:8080"
    volumes:
      - ${APP_FIREBASE_SERVICE_ACCOUNT_HOST_PATH:-./secrets/firebase-admin.json}:/run/secrets/firebase-admin.json:ro
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
