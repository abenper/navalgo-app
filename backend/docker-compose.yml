services:
  backend:
    build: .
    container_name: navalgo-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://private-navalgo-db-do-user-33837097-0.h.db.ondigitalocean.com:25060/defaultdb?sslmode=require}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-doadmin}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      APP_JWT_SECRET: ${APP_JWT_SECRET}
      APP_JWT_EXPIRATION_MS: ${APP_JWT_EXPIRATION_MS:-3600000}
      APP_JWT_REFRESH_EXPIRATION_MS: ${APP_JWT_REFRESH_EXPIRATION_MS:-604800000}
      APP_FRONTEND_BASE_URL: ${APP_FRONTEND_BASE_URL:-https://app.naval-go.com}
      APP_SECURITY_CORS_ALLOWED_ORIGINS: ${APP_SECURITY_CORS_ALLOWED_ORIGINS:-https://app.naval-go.com,https://naval-go.com,https://www.naval-go.com,http://localhost:*,http://127.0.0.1:*}
      APP_SECURITY_COOKIE_REFRESH_NAME: ${APP_SECURITY_COOKIE_REFRESH_NAME:-navalgo_refresh_token}
      APP_SECURITY_COOKIE_SAME_SITE: ${APP_SECURITY_COOKIE_SAME_SITE:-Lax}
      APP_SECURITY_COOKIE_SECURE: ${APP_SECURITY_COOKIE_SECURE:-false}
      APP_SECURITY_COOKIE_PATH: ${APP_SECURITY_COOKIE_PATH:-/api/auth}
      APP_MEDIA_SPACES_ENDPOINT: ${APP_MEDIA_SPACES_ENDPOINT}
      APP_MEDIA_SPACES_REGION: ${APP_MEDIA_SPACES_REGION:-fra1}
      APP_MEDIA_SPACES_BUCKET: ${APP_MEDIA_SPACES_BUCKET}
      APP_MEDIA_SPACES_ACCESS_KEY: ${APP_MEDIA_SPACES_ACCESS_KEY}
      APP_MEDIA_SPACES_SECRET_KEY: ${APP_MEDIA_SPACES_SECRET_KEY}
      APP_MEDIA_PUBLIC_BASE_URL: ${APP_MEDIA_PUBLIC_BASE_URL}
      APP_FIREBASE_ENABLED: ${APP_FIREBASE_ENABLED:-true}
      APP_FIREBASE_SERVICE_ACCOUNT_PATH: ${APP_FIREBASE_SERVICE_ACCOUNT_PATH:-/run/secrets/firebase-admin.json}
      APP_FIREBASE_SERVICE_ACCOUNT_JSON: ${APP_FIREBASE_SERVICE_ACCOUNT_JSON:-}
      APP_AUTH_REGISTRATION_INVITATION_TTL_HOURS: ${APP_AUTH_REGISTRATION_INVITATION_TTL_HOURS:-72}
      APP_EMAIL_ENABLED: ${APP_EMAIL_ENABLED:-false}
      APP_EMAIL_FROM: ${APP_EMAIL_FROM:-Naval-GO <no-reply@naval-go.com>}
      APP_EMAIL_REPLY_TO: ${APP_EMAIL_REPLY_TO:-soporte@naval-go.com}
      APP_EMAIL_RESEND_API_KEY: ${APP_EMAIL_RESEND_API_KEY:-}
      APP_EMAIL_RESEND_API_URL: ${APP_EMAIL_RESEND_API_URL:-https://api.resend.com/emails}
    ports:
      - "${BACKEND_BIND_ADDRESS:-127.0.0.1}:8080:8080"
    volumes:
      - ${APP_FIREBASE_SERVICE_ACCOUNT_HOST_PATH:-./secrets/firebase-admin.json}:/run/secrets/firebase-admin.json:ro
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
