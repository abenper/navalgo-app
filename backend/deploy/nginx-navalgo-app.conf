# Base HTTP config for the Flutter web app.
# Run certbot with --nginx after enabling this file so it can add HTTPS safely.
server {
    listen 80;
    listen [::]:80;
    server_name app.naval-go.com;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root /var/www/naval-go-app;
    index index.html;
    client_max_body_size 25m;

    location / {
        add_header Service-Worker-Allowed "/" always;
        if ($request_uri = "/") {
            add_header Clear-Site-Data '"cache"' always;
        }
        try_files $uri $uri/ /index.html;
    }

    location = /flutter_service_worker.js {
        add_header Cache-Control "no-cache, no-store, max-age=0, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }

    location = /firebase-messaging-sw.js {
        add_header Cache-Control "no-cache, no-store, max-age=0, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header Service-Worker-Allowed "/" always;
        try_files $uri =404;
    }

    location = /flutter_bootstrap.js {
        add_header Cache-Control "no-cache, no-store, max-age=0, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }

    location = /manifest.json {
        add_header Cache-Control "no-cache, no-store, max-age=0, must-revalidate" always;
        try_files $uri =404;
    }

    location = /assets/FontManifest.json {
        add_header Cache-Control "no-cache, no-store, max-age=0, must-revalidate" always;
        try_files $uri =404;
    }

    location = /assets/AssetManifest.bin {
        add_header Cache-Control "no-cache, no-store, max-age=0, must-revalidate" always;
        try_files $uri =404;
    }

    location = /assets/AssetManifest.bin.json {
        add_header Cache-Control "no-cache, no-store, max-age=0, must-revalidate" always;
        try_files $uri =404;
    }

    location /assets/fonts/ {
        add_header Cache-Control "no-cache, no-store, max-age=0, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        types {
            font/otf otf;
            font/ttf ttf;
            font/woff woff;
            font/woff2 woff2;
        }
        try_files $uri =404;
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=3600, must-revalidate" always;
        try_files $uri =404;
    }

    location ~ /\. {
        deny all;
    }

    location ~ ~$ {
        deny all;
    }
}
