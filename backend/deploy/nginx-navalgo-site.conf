# Base HTTP config for the commercial site.
# Run certbot with --nginx after enabling this file so it can add HTTPS safely.
server {
    listen 80;
    listen [::]:80;
    server_name naval-go.com www.naval-go.com;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root /var/www/naval-go-site;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|svg|webp|ico|xml|txt)$ {
        add_header Cache-Control "public, max-age=3600, must-revalidate" always;
        try_files $uri =404;
    }

    location ~ /\. {
        deny all;
    }
}
