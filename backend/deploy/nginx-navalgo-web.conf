# HTTP redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name naval-go.com www.naval-go.com;
    return 301 https://$server_name$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name naval-go.com www.naval-go.com;

    # SSL certificates (managed by certbot for Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/naval-go.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/naval-go.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # HSTS header (1 year)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    root /var/www/naval-go;
    index index.html;

    # Allow larger payloads for future uploads from web app.
    client_max_body_size 25m;

    # Security headers to prevent Mixed Content warnings
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Flutter SPA routing with optimized cache clearing
    location / {
        # Service Worker specification compliance
        add_header Service-Worker-Allowed "/" always;
        # Only clear cache on document requests, not asset requests
        if ($request_uri = "/") {
            add_header Clear-Site-Data '"cache"' always;
        }
        try_files $uri $uri/ /index.html;
    }

    # Service worker - no cache
    location = /flutter_service_worker.js {
        add_header Cache-Control "no-cache, no-store, max-age=0, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }

    # Firebase Cloud Messaging service worker - no cache, must be JS
    location = /firebase-messaging-sw.js {
        add_header Cache-Control "no-cache, no-store, max-age=0, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header Service-Worker-Allowed "/" always;
        try_files $uri =404;
    }

    # Flutter bootstrap - no cache
    location = /flutter_bootstrap.js {
        add_header Cache-Control "no-cache, no-store, max-age=0, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }

    # Manifest files - no cache
    location = /manifest.json {
        add_header Cache-Control "no-cache, no-store, max-age=0, must-revalidate" always;
        try_files $uri =404;
    }

    # Asset manifests - no cache, correct content types
    location = /assets/FontManifest.json {
        add_header Cache-Control "no-cache, no-store, max-age=0, must-revalidate" always;
        try_files $uri =404;
    }

    location = /assets/AssetManifest.bin {
        add_header Cache-Control "no-cache, no-store, max-age=0, must-revalidate" always;
        try_files $uri =404;
    }

    location = /assets/AssetManifest.bin.json {
        add_header Cache-Control "no-cache, no-store, max-age=0, must-revalidate" always;
        try_files $uri =404;
    }

    # Flutter web icon/font assets keep the same filename across builds.
    # Do not cache them aggressively or browsers may keep an old
    # MaterialIcons-Regular.otf that no longer matches the release bundle.
    location /assets/fonts/ {
        add_header Cache-Control "no-cache, no-store, max-age=0, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        types {
            font/otf otf;
            font/ttf ttf;
            font/woff woff;
            font/woff2 woff2;
        }
        try_files $uri =404;
    }

    # Other assets - moderate cache
    location /assets/ {
        add_header Cache-Control "public, max-age=3600, must-revalidate" always;
        try_files $uri =404;
    }

    # Deny access to sensitive files
    location ~ /\. {
        deny all;
    }
    location ~ ~$ {
        deny all;
    }
}
