server {
    listen 80;
    server_name naval-go.com www.naval-go.com;

    root /var/www/naval-go;
    index index.html;

    # Allow larger payloads for future uploads from web app.
    client_max_body_size 25m;

    # Flutter SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache immutable build assets aggressively.
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
